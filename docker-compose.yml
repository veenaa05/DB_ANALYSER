# =============================================================================
#  DBAnalyser — Docker Compose
# =============================================================================
#  Services:
#    postgres     — PostgreSQL 15 (results + trend storage)
#    api          — DBAnalyser REST API (FastAPI + uvicorn)
#
#  Quick start:
#    docker compose up -d
#    # API:       http://localhost:8000/docs
#    # PgAdmin:   http://localhost:5050  (optional)
#
#  Stop:
#    docker compose down
#
#  Production: override secrets via .env or environment:
#    POSTGRES_PASSWORD=<strong-password>
#    DBANALYSER_API_KEY=<api-key>
# =============================================================================

version: "3.9"

# ── Shared environment for DBAnalyser services ────────────────────────────────
x-dbanalyser-env: &dbanalyser-env
  DBANALYSER_POSTGRES_HOST:     postgres
  DBANALYSER_POSTGRES_PORT:     "5432"
  DBANALYSER_POSTGRES_DATABASE: dbanalyser
  DBANALYSER_POSTGRES_USER:     dbanalyser_user
  DBANALYSER_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_this_password}"
  DBANALYSER_API_API_KEY:       "${DBANALYSER_API_KEY:-}"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "/app"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dbanalyser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dbanalyser
      POSTGRES_USER:     dbanalyser_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_this_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema on first start
      - ./dbanalyser/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbanalyser_user -d dbanalyser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DBAnalyser REST API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: dbanalyser:2.0.0
    container_name: dbanalyser-api
    restart: unless-stopped
    command: ["dbanalyser", "api", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *dbanalyser-env
    volumes:
      - ./analysis_config.yaml:/app/analysis_config.yaml:ro
      - ./custom_rules:/app/custom_rules:ro
      - output_data:/app/output
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── pgAdmin (optional — comment out in production) ────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dbanalyser-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    "${PGADMIN_EMAIL:-admin@ltfs.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools        # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
    driver: local
  output_data:
    driver: local

networks:
  default:
    name: dbanalyser-network
